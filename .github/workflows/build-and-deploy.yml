name: Build and Deploy Aspire App

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_API: ${{ github.repository }}/webapi
  IMAGE_NAME_WEBAPP: ${{ github.repository }}/webapp

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Install Aspire CLI
        run: dotnet tool install -g aspire.cli --prerelease

      - name: Setup Docker
        uses: docker/setup-docker-action@v3

      - name: Build Aspire application
        run: |
          dotnet restore
          aspire publish --output-path ./aspire-output

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for API image
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_API }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=next
            type=sha,prefix={{branch}}-

      - name: Extract metadata for WebApp image
        id: meta-webapp
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_WEBAPP }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=next
            type=sha,prefix={{branch}}-

      - name: Retag images for GitHub Registry
        run: |          
          for tag in $(echo '${{ steps.meta-api.outputs.tags }}' | tr '\n' ' '); do
            docker tag webapi:latest $tag
            docker push $tag
          done
          
          for tag in $(echo '${{ steps.meta-webapp.outputs.tags }}' | tr '\n' ' '); do
            docker tag webapp:latest $tag
            docker push $tag
          done

      - name: Prepare release artifacts
        run: |
          mkdir -p release-artifacts
          
          cp ./aspire-output/docker-compose.yml release-artifacts/ || echo "docker-compose.yml not found"
          cp ./aspire-output/.env release-artifacts/ || echo ".env not found"
          
          echo "# Image Tags for this release" > release-artifacts/image-tags.md
          echo "" >> release-artifacts/image-tags.md
          echo "## API Image Tags:" >> release-artifacts/image-tags.md
          echo '${{ steps.meta-api.outputs.tags }}' | sed 's/^/- /' >> release-artifacts/image-tags.md
          echo "" >> release-artifacts/image-tags.md
          echo "## WebApp Image Tags:" >> release-artifacts/image-tags.md
          echo '${{ steps.meta-webapp.outputs.tags }}' | sed 's/^/- /' >> release-artifacts/image-tags.md
          
          echo "=== Release artifacts prepared ==="
          ls -la release-artifacts/

      - name: Generate changelog from commits
        id: changelog
        run: |
          # Get commits since last release (or all commits if no releases)
          if git describe --tags --abbrev=0 2>/dev/null; then
            LAST_TAG=$(git describe --tags --abbrev=0)
            echo "Generating changelog since $LAST_TAG"
            CHANGELOG=$(git log $LAST_TAG..HEAD --pretty=format:"- %s (%h)" --no-merges)
          else
            echo "No previous tags found, generating changelog from all commits"
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" --no-merges)
          fi
          
          # Create changelog file
          echo "# Changelog" > release-artifacts/CHANGELOG.md
          echo "" >> release-artifacts/CHANGELOG.md
          echo "## Changes in this release:" >> release-artifacts/CHANGELOG.md
          echo "" >> release-artifacts/CHANGELOG.md
          echo "$CHANGELOG" >> release-artifacts/CHANGELOG.md
          
          # Set output for use in release
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}-${{ github.sha }}
          name: Release ${{ github.ref_name }}-${{ github.sha }}
          body: |
            # Release ${{ github.ref_name }}-${{ github.sha }}
            
            ## Docker Images
            
            ### API Image Tags:
            ${{ steps.meta-api.outputs.tags }}
            
            ### WebApp Image Tags:
            ${{ steps.meta-webapp.outputs.tags }}
            
            ## Changes
            ${{ steps.changelog.outputs.changelog }}
            
            ## Files
            This release includes:
            - `docker-compose.yml` - Docker compose configuration
            - `.env` - Environment variables
            - `CHANGELOG.md` - Detailed changelog
          files: |
            release-artifacts/*
          draft: false
          prerelease: ${{ github.ref_name != 'main' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}    
          
      - name: Output image information
        run: |
          echo "API Image Tags:"
          echo '${{ steps.meta-api.outputs.tags }}'
          echo ""
          echo "WebApp Image Tags:"
          echo '${{ steps.meta-webapp.outputs.tags }}'