syntax = "proto3";

option csharp_namespace = "RemoteCode";

package code_completion;

service CodeCompletion {
  rpc StartSession (StartSessionRequest) returns (SessionInfo);
  rpc StopSession (SessionInfo) returns (Empty);
  rpc UpdateSession (UpdateSessionRequest) returns (Empty);
  rpc GetCompletion (SessionInfo) returns (GetCompletionReply);
  rpc GetDescription (GetDescriptionRequest) returns (GetDescriptionReply);
  rpc GetDiagnostics (SessionInfo) returns (GetDiagnosticsReply);
}

message Empty {

}

message SessionInfo {
  string uuid = 1;
}

message UpdateSessionRequest {
  string sessionUuid = 1;
  string code = 2;
  int32 caretPosition = 3;
}

message CompletionInfo {
  string type = 1;
  string displayText = 2;
  string description = 3;
  string inlayHint = 4;
  string sortText = 5;
  string insertText = 6;
}

message GetCompletionReply {
  repeated CompletionInfo completions = 1;
}

message StartSessionRequest {
  string code = 1;
  int32 caretPosition = 3;
}

message GetDescriptionRequest {
  string sessionUuid = 1;
  optional string activeWord = 2;
}

message GetDescriptionReply {
  string description = 1;
  repeated TaggedText taggedParts = 2;
}

message TaggedText {
  string tag = 1;
  string text = 2;
}

message GetDiagnosticsReply {
  repeated Diagnostic diagnostics = 1;
}

enum Severity {
  Hidden = 0;
  Info = 1;
  Warning = 2;
  Error = 3;
}

message Diagnostic {
  Severity severity = 1;
  string message = 2;
  uint32 startLine = 3;
  uint32 startColumn = 4;
  uint32 endLine = 5;
  uint32 endColumn = 6;
  optional string code = 7;
}

message Tags {
  repeated string tag = 1;
}
